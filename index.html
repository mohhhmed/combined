<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSA Binary Cryptosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #ec4899;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.2rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: #818cf8;
        }

        .section-header i {
            margin-right: 0.75rem;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #818cf8);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 1rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .status {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-align: center;
        }

        .keys-display {
            font-family: 'Inter', monospace;
            font-size: 0.75rem;
            word-break: break-all;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            color: #10b981;
            display: none;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>RSA Vault</h1>
            <p class="subtitle">Secure Binary Path Encryption</p>

            <!-- Encryption Step -->
            <div class="section">
                <div class="section-header">
                    <span>1. Encrypt File</span>
                </div>
                <div class="file-input-wrapper">
                    <input type="file" id="encryptInput">
                </div>
                <button id="encryptBtn" class="btn-primary">
                    <span class="loader" id="encryptLoader"></span>
                    <span>Encrypt & Download</span>
                </button>
                <div id="encryptStatus" class="status">Encryption Complete! Check downloads.</div>
                <div id="keysDisplay" class="keys-display"></div>
            </div>

            <!-- Decryption Step -->
            <div class="section">
                <div class="section-header">
                    <span>2. Decrypt File</span>
                </div>
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.5rem;">Upload the .enc file</p>
                <div class="file-input-wrapper">
                    <input type="file" id="decryptInput">
                </div>
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.5rem;">Upload the .keys.json file</p>
                <div class="file-input-wrapper">
                    <input type="file" id="keyInput">
                </div>
                <button id="decryptBtn" class="btn-primary" style="background: linear-gradient(135deg, #ec4899, #f43f5e);">
                    <span class="loader" id="decryptLoader"></span>
                    <span>Decrypt & Restore</span>
                </button>
                <div id="decryptStatus" class="status" style="background: rgba(99, 102, 241, 0.1); color: #818cf8; border-color: rgba(99, 102, 241, 0.2);">Decryption Complete! File restored.</div>
            </div>
        </div>
        <footer>
            Built with RSA Mathematical Core • Pure TypeScript
        </footer>
    </div>

    <script src="dist/bundle.js"></script>
</body>
</html>
